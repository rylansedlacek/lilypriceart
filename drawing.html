<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Drawing | Lily Price</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="site-header">
        <nav class="navbar">
            <div class="nav-left">
                <a href="bio.html">Bio & Statement</a>
            </div>

            <div class="nav-center">
                <a href="index.html" class="site-title">
                    Lily Price
                </a>
            </div>

            <div class="nav-right">
                <a href="painting.html">Paintings</a>
                <a href="drawing.html">Drawings</a>
                <a href="sculpture.html">Sculpture</a>
            </div>
        </nav>
    </header>

    <main>
         <!--TODO Dynamic-->
        <section class="grid">
            <div class="grid-item" onclick="openModal(0)">
                <img src="images/Drawing/What goes on.jpg">
            </div>

            <div class="grid-item" onclick="openModal(1)">
                <img src="images/Drawing/Clair.jpg">
            </div>

            <div class="grid-item" onclick="openModal(2)">
                <img src="images/Drawing/Margo.jpg">
            </div>

            <div class="grid-item" onclick="openModal(3)">
                <img src="images/Drawing/Til_ I Die.jpg">
            </div>

            <div class="grid-item" onclick="openModal(4)">
                <img src="images/Drawing/Stiple Girl.jpg">
            </div>

            <div class="grid-item" onclick="openModal(5)">
                <img src="images/Drawing/Still life 1.jpg">
            </div>

            <div class="grid-item" onclick="openModal(6)">
                <img src="images/Drawing/Senior.jpg">
            </div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-main">
                <img id="modal-main-image">
                <div class="thumbs" id="thumbs"></div>
            </div>

            <div class="modal-info">
                <h2 id="modal-title">Artwork Title</h2>
                <p id="modal-description">
                    Artwork description goes here.
                </p>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <p>© 2026 Lily Price</p>
    </footer>

    <script>
        // TODO Dynamic
        const artworks = [
            {
                title: "What goes on",
                desc: "Placeholder Description",
                main: "images/Drawing/What goes on.jpg",
                subs: []
            },
            {
                title: "Claire, 11″x9″",
                desc: "Colored pencil on paper, 2024",
                main: "images/Drawing/Clair.jpg",
                subs: []
            },
            {
                title: "Margo",
                desc: "Placeholder Description",
                main: "images/Drawing/Margo.jpg",
                subs: []
            },
            {
                title: "‘Til I die, 24″x18″",
                desc: "Charcoal on paper, 2024",
                main: "images/Drawing/Til_ I Die.jpg",
                subs: []
            },
            {
                title: "Stippled girl",
                desc: "24″x18″, Ink pen on paper, 2024",
                main: "images/Drawing/Stiple Girl.jpg",
                subs: []
            },
            {
                title: "Still life #1",
                desc: "24″x18″, Graphite on paper, 2024",
                main: "images/Drawing/Still life 1.jpg",
                subs: []
            },
            {
                title: "Disproportionate",
                desc: "20″x20″, Colored pencil on board, 2022",
                main: "images/Drawing/Senior.jpg",
                subs: []
            }
        ];

        let currentIndex = 0;

        const modal = document.getElementById("modal");
        const mainImage = document.getElementById("modal-main-image");
        const title = document.getElementById("modal-title");
        const desc = document.getElementById("modal-description");
        const thumbs = document.getElementById("thumbs");

        function openModal(index) {
            currentIndex = index;
            modal.style.display = "flex";
            loadArtwork();
        }

        function loadArtwork() {
            const art = artworks[currentIndex];
            mainImage.src = art.main;
            title.textContent = art.title;
            desc.textContent = art.desc;

            thumbs.innerHTML = "";

            art.subs.forEach((img, i) => {
                const t = document.createElement("img");
                t.src = img;

                t.onclick = () => {
                    mainImage.src = img;
                };
                thumbs.appendChild(t);
            });
        }

        window.onclick = function (e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        };
    </script>

</body>
</html>
