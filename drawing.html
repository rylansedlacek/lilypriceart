<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Drawing | Lily Price</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="site-header">
        <nav class="navbar">
            <div class="nav-left">
                <a href="bio.html">Bio & Statement</a>
            </div>

            <div class="nav-center">
                <a href="/" class="site-title">
                    Lily Price
                </a>
            </div>

            <div class="nav-right">
                <a href="painting.html">Painting</a>
                <a href="drawing.html">Drawing</a>
                <a href="sculpture.html">Sculpture</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="grid" id="drawing-grid">     </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">

            <div class="modal-main">
                <img id="modal-main-image">
                <div class="thumbs" id="thumbs"></div>
            </div>

            <div class="modal-info">
                <h2 id="modal-title">Artwork Title</h2>
                <p id="modal-description">Artwork description goes here.</p>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <p>© 2026 Lily Price</p>
    </footer>

    <script>
        let artworks = [];
        let currentIndex = 0;

        const grid =
            document.getElementById("drawing-grid");

        const modal =
            document.getElementById("modal");

        const mainImage =
            document.getElementById("modal-main-image");

        const title =
            document.getElementById("modal-title");

        const desc =
            document.getElementById("modal-description");

        const thumbs =
            document.getElementById("thumbs");

        async function loadDrawingData() {
            try {
                const response =
                    await fetch("http://3.94.89.95:3000/api/artwork/drawing");

                artworks =
                    await response.json();

                renderGrid();
            } catch (err) {
                console.error("Failed to load drawings:", err);
            }
        }

        function renderGrid() {
            grid.innerHTML = "";
            artworks.forEach((art, index) => {
                const item =
                    document.createElement("div");
                item.className =
                    "grid-item";
                item.innerHTML =
                    `<img src="${art.main}">`;
                item.onclick =
                    () => openModal(index);

                grid.appendChild(item);
            });
        }

        function openModal(index) {
            currentIndex = index;
            modal.style.display = "flex";
            loadArtwork();
        }

        function loadArtwork() {
            const art =
                artworks[currentIndex];

            mainImage.src =
                art.main;

            title.textContent =
                art.title;

            desc.textContent =
                art.desc;

            thumbs.innerHTML =
                "";

            art.subs.forEach(img => {
                const t =
                    document.createElement("img");
                t.src = img;

                t.onclick =
                    () => mainImage.src = img;

                thumbs.appendChild(t);
            });
        }

        window.onclick = function (e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        };
        loadDrawingData();
    </script>

</body>
</html>
