    <script>
        // TODO Dynamic
        const artworks = [
            {
                title: "Dinosaur Destroyer",

                main: "images/Painting/Painting 1/DinosaurDestroyer.jpg",
                subs: []
            },
            {
                title: "The Farewell of Telemachus and Eucharis after Jacques-Louis David",
                desc: "Oil on Canvas, 30″x24″, 2025",

                subs: []
            },
            {
                title: "Save Yourself Part 2",
                desc: "Oil on Canvas, 48″x36″, 2025",
                main: "images/Painting/abstract/FinalProject_SaveyourselfPt.2.jpg",
                subs: []
            },
            {
                title: "Save yourself Part 1",
                desc: "Oil on Canvas, 11″x9″, 2025",
                main: "images/Painting/abstract/SaveyourselfPt.1.jpg",
                subs: []
            },
            {

                desc: "Placeholder Description",

                subs: []
            },
            {
                title: "Who goes there!",
                desc: "Placeholder Description",
                main: "images/Painting/abstract/Whogoesthere!.jpg",
                subs: []
            },
            {
                title: "Leave Me Like You Found Me",
                desc: "Oil on Canvas, 48″x48″, 2025",
                main: "images/Painting/Painting 2/LeaveMeLikeYouFoundMe.jpg",
                subs: [
                    "images/Painting/Painting 2/LeaveMeLikeYouFoundMe.jpg",
                    "images/Painting/Painting 2/Leavemecloseup.jpg"
                ]
            },
            {
                title: "Unearthly Glow",
                desc: "Placeholder Description",
                main: "images/Painting/Painting 1/Unearthlyglow.jpg",
                subs: []
            },
            {
                title: "Placeholder Title",
                desc: "Placeholder Description",
                main: "images/Painting/Painting 1/First b+w still life.jpg",
                subs: []
            },
            {
                title: "Always Returning",
                desc: "Placeholder Description",
                main: "images/Painting/Thesis paintings/Always Returning.jpg",
                subs: [
                    "images/Painting/Thesis paintings/Always Returning.jpg",
                    "images/Painting/Thesis paintings/Always Returning close up.jpg",
                ]
            },
            {
                title: "The Thick and The Thin",
                desc: "Placeholder Description",
                main: "images/Painting/Thesis paintings/The Thick and The Thin.jpg",
                subs: [
                    "images/Painting/Thesis paintings/The Thick and The Thin.jpg",
                    "images/Painting/Thesis paintings/the thick and the thin face close up.jpg",
                    "images/Painting/Thesis paintings/the thick and the thing background close up.jpg"
                ]
            },
            {
                title: "Placeholder Title",
                desc: "Placeholder Description",
                main: "images/Painting/Painting 1/Smallwoodenlandscape.jpg",
                subs: []
            }
        ];

        let currentIndex = 0;

        const modal = document.getElementById("modal");
        const mainImage = document.getElementById("modal-main-image");
        const title = document.getElementById("modal-title");
        const desc = document.getElementById("modal-description");
        const thumbs = document.getElementById("thumbs");

        function openModal(index) {
            currentIndex = index;
            modal.style.display = "flex";
            loadArtwork();
        }

        function loadArtwork() {
            const art = artworks[currentIndex];
            mainImage.src = art.main;
            title.textContent = art.title;
            desc.textContent = art.desc;

            thumbs.innerHTML = "";

            art.subs.forEach((img, i) => {
                const t = document.createElement("img");
                t.src = img;
                t.onclick = () => {
                    mainImage.src = img;
                };
                thumbs.appendChild(t);
            });
        }

        window.onclick = function (e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        };
    </script>

</body>
