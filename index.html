<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lily Price</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="site-header">
        <nav class="navbar">

            <div class="nav-left">
                <a href="bio.hmtl">Bio & Statement</a>
            </div>

            <div class="nav-center">
                <a href="/" class="site-title">
                    Lily Price
                </a>
            </div>

            <div class="nav-right">
                <a href="painting.html">Painting</a>
                <a href="drawing.html">Drawing</a>
                <a href="sculpture.html">Sculpture</a>
            </div>

        </nav>
    </header>

    <main>

        <section class="carousel-section">

            <div class="carousel-track">

                <div class="side-image left-image">
                    <img id="left-image" src="">
                </div>

                <div class="center-image">
                    <img
                        id="center-image"
                        src=""
                        alt="Artwork slideshow image"
                    >
                    <div class="carousel-description">
                        <p id="carousel-caption"></p>
                    </div>
                </div>

                <div class="side-image right-image">
                    <img id="right-image" src="">
                </div>

            </div>

        </section>

    </main>

    <footer class="site-footer">
        <p>© 2026 Lily Price</p>
    </footer>

    <script>

        let artworks = [];
        let currentIndex = 0;

        const centerImage =
            document.getElementById("center-image");

        const leftImage =
            document.getElementById("left-image");

        const rightImage =
            document.getElementById("right-image");

        const caption =
            document.getElementById("carousel-caption");

        async function loadCarouselData() {
            try {
                const response =
                    await fetch("https://api.lilypriceart.com/api/carousel");
                artworks =
                    await response.json();
                updateCarousel();
            } catch (error) {
                console.error(
                    "Failed to load carousel data:",
                    error
                );
            }
        }

        function updateCarousel() {
            if (artworks.length === 0) return;

            const prevIndex =
                (currentIndex - 1 + artworks.length)
                % artworks.length;

            const nextIndex =
                (currentIndex + 1)
                % artworks.length;

            centerImage.src =
                artworks[currentIndex].image;

            leftImage.src =
                artworks[prevIndex].image;

            rightImage.src =
                artworks[nextIndex].image;

            caption.textContent =
                artworks[currentIndex].caption;
        }

        leftImage.addEventListener("click", () => {
            currentIndex--;
            if (currentIndex < 0) {
                currentIndex = artworks.length - 1;
            }
            updateCarousel();
        });

        rightImage.addEventListener("click", () => {
            currentIndex++;
            if (currentIndex >= artworks.length) {
                currentIndex = 0;
            }
            updateCarousel();
        });
        loadCarouselData();
    </script>

</body>
</html>
