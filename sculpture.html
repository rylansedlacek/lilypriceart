                    "images/Sculpture/Pantyhose/Lily_Price_Project 3_Part 1, image 3.jpg",

                main: "images/Sculpture/through the desert, repenting/Lily_Price_Project 4_through the desert, repenting_front angle.jpg",
                subs: [

                    "images/Sculpture/through the desert, repenting/Lily_Price_Project 4_through the desert, repenting_left angel.jpg.jpg",

                ]

            {

                desc: "Placeholder Description",
                main: "images/Sculpture/Pantyhose/Lily_Price_Project 3_Screw image 2.jpeg",
                subs: [
                    "images/Sculpture/Pantyhose/Lily_Price_Project 3_Screw image 2.jpeg",
                    "images/Sculpture/Pantyhose/Lily_Price_Project 3_Screw image 3.jpeg",
                    "images/Sculpture/Pantyhose/Lily_Price_Project 3_Screw image 4.jpeg"
                ]
            }
        ];

        let currentIndex = 0;
        const modal = document.getElementById("modal");
        const mainImage = document.getElementById("modal-main-image");
        const title = document.getElementById("modal-title");
        const desc = document.getElementById("modal-description");
        const thumbs = document.getElementById("thumbs");

        function openModal(index) {
            currentIndex = index;
            modal.style.display = "flex";
            loadArtwork();
        }

        function loadArtwork() {
            const art = artworks[currentIndex];
            mainImage.src = art.main;
            title.textContent = art.title;
            desc.textContent = art.desc;

            thumbs.innerHTML = "";

            art.subs.forEach((img, i) => {
                const t = document.createElement("img");
                t.src = img;

                t.onclick = () => {
                    mainImage.src = img;
                };
                thumbs.appendChild(t);
            });
        }

        window.onclick = function (e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        };
    </script>
