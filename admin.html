<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel | Lily Price</title>
</head>

<body>

<h1>Admin Panel</h1>

<label>Choose Page:</label>
<select id="category">
    <option value="Painting">Painting</option>
    <option value="Drawing">Drawing</option>
    <option value="Sculpture">Sculpture</option>
</select>

<hr>

<input id="title" placeholder="Title"><br><br>

<textarea id="desc" placeholder="Description"></textarea><br><br>

<label>Main Image:</label>
<input type="file" id="mainImage"><br><br>

<label>Sub Images:</label>
<input type="file" id="subImages" multiple><br><br>

<button onclick="submitEntry()">Save Artwork</button>

<script>

const GITHUB_TOKEN = "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"; 
const REPO = "rylansedlacek/lilypriceart";
const BRANCH = "main";

const CATEGORY_MAP = {
    Painting: {
        json: "painting.json",
        imageDir: "Painting"
    },
    Drawing: {
        json: "drawing.json",
        imageDir: "Drawing"
    },
    Sculpture: {
        json: "sculpture.json",
        imageDir: "Sculpture"
    }
};

function toBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

async function getFile(path) {

    const url =
        `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}`;

    const res = await fetch(url, {
        method: "GET",
        headers: {
            "Authorization": `Bearer ${GITHUB_TOKEN}`,
            "Accept": "application/vnd.github+json"
        }
    });

    const data = await res.json();

    if (!res.ok) {
        console.error("GitHub error:", data);
        throw new Error(data.message || "File not found");
    }

    return data;
}

async function uploadFile(file, path) {

    const content = await toBase64(file);

    const res = await fetch(
        `https://api.github.com/repos/${REPO}/contents/${path}`,
        {
            method: "PUT",
            headers: {
                "Authorization": `token ${GITHUB_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "upload image",
                content: content,
                branch: BRANCH
            })
        }
    );

    const data = await res.json();

    if (!res.ok) {
        console.error(data);
        throw new Error("Upload failed: " + path);
    }

    return `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${path}`;
}

async function updateJSON(path, newEntry) {

    let file;
    let current = [];

    try {
        file = await getFile(path);
        current = JSON.parse(atob(file.content));
    } catch (err) {
        console.warn("JSON not found, creating new file:", path);
    }

    current.push(newEntry);

    const updatedContent = btoa(
        unescape(encodeURIComponent(JSON.stringify(current, null, 2)))
    );

    const body = {
        message: "update artwork json",
        content: updatedContent,
        branch: BRANCH
    };

    if (file && file.sha) {
        body.sha = file.sha;
    }

    const res = await fetch(
        `https://api.github.com/repos/${REPO}/contents/${path}`,
        {
            method: "PUT",
            headers: {
                "Authorization": `token ${GITHUB_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
        }
    );

    const data = await res.json();

    if (!res.ok) {
        console.error(data);
        throw new Error("JSON update failed");
    }
}

async function submitEntry() {

    const category = document.getElementById("category").value;
    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;

    const mainFile = document.getElementById("mainImage").files[0];
    const subFiles = document.getElementById("subImages").files;

    if (!mainFile) {
        alert("Main image required");
        return;
    }

    const config = CATEGORY_MAP[category];

    const mainPath =
        `images/${config.imageDir}/${Date.now()}_${mainFile.name}`;

    const mainUrl = await uploadFile(mainFile, mainPath);

    let subs = [];

    for (let file of subFiles) {

        const path =
            `images/${config.imageDir}/${Date.now()}_${file.name}`;

        const url = await uploadFile(file, path);
        subs.push(url);
    }

    const entry = {
        title,
        desc,
        main: mainUrl,
        subs
    };


    await updateJSON(
        `data/${config.json}`,
        entry
    );

    alert("Upload successful!");
}

</script>

</body>
</html>
